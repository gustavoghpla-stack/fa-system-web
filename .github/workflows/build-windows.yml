name: Build Windows Executable

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Vite
        run: npm run build

      - name: Package Electron (Windows x64)
        run: npx electron-packager . FA-Higienizacoes --platform=win32 --arch=x64 --out=release --overwrite --ignore="^/src" --ignore="^/release" --ignore="^/dist-electron" --ignore="^/.github" --ignore="^/gas"

      - name: Zip release folder
        shell: pwsh
        run: |
          Compress-Archive -Path release/FA-Higienizacoes-win32-x64 -DestinationPath release/FA-Higienizacoes-win32-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FA-Higienizacoes-win32-x64
          path: release/FA-Higienizacoes-win32-x64.zip
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/FA-Higienizacoes-win32-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
